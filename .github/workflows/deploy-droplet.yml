name: Deploy DigitalOcean Droplet

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script_stop: true
          script: |
            export GIT_REF="${{ inputs.git_ref }}"
            export APP_DIR="${{ secrets.DO_APP_DIRECTORY }}"
            export API_SERVICE="${{ secrets.DO_API_SERVICE }}"
            export SCHEDULE_TIMER="${{ secrets.DO_SCHEDULE_TIMER }}"
            export APP_ENV_FILE="${{ secrets.DO_APP_ENV_FILE }}"
            bash "${APP_DIR}/scripts/ops/deploy-droplet.sh"
