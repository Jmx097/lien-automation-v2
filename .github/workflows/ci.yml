name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run test:types

      - name: Validate workflow YAML
        run: npm run test:workflow-syntax

      - name: Validate cloud shell scripts
        run: npm run test:cloud-shell

      - name: Test cloud helper scripts
        run: npm run test:cloud
