name: Deploy Cloud Run Service

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main
      service_name:
        description: Cloud Run service name
        required: false
        default: lien-automation

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
      SERVICE_NAME: ${{ inputs.service_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Validate scheduler token secret ref
        env:
          SCHEDULE_RUN_TOKEN_SECRET_REF: ${{ secrets.SCHEDULE_RUN_TOKEN_SECRET_REF }}
        run: node scripts/cloud/resolve-secret-ref.js --validate-only

      - name: Build and push image
        env:
          IMAGE_URI: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${{ inputs.service_name }}:${{ github.sha }}
        run: |
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run service
        env:
          GIT_SHA: ${{ github.sha }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          MERGED_SHEET_ID: 1qa32AEUMC4TYHh4G6AV4msRS4GjQQZFTNPpYHMh4n5A
          DATABASE_URL_SECRET_REF: ${{ secrets.DATABASE_URL_SECRET_REF }}
          SCHEDULE_RUN_TOKEN_SECRET_REF: ${{ secrets.SCHEDULE_RUN_TOKEN_SECRET_REF }}
          SHEETS_KEY_SECRET_REF: ${{ secrets.SHEETS_KEY_SECRET_REF }}
          SBR_CDP_URL_SECRET_REF: ${{ secrets.SBR_CDP_URL_SECRET_REF }}
          BRIGHTDATA_BROWSER_WS_SECRET_REF: ${{ secrets.BRIGHTDATA_BROWSER_WS_SECRET_REF }}
          CLOUDSQL_INSTANCE_CONNECTION_NAME: ${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}
          LEAD_ALERT_WEBHOOK_URL: ${{ secrets.lien_automation_lead_alert_webhook_url }}
          SCHEDULE_ALERT_WEBHOOK_URL: ${{ secrets.SCHEDULE_ALERT_WEBHOOK_URL }}
          AMOUNT_MIN_COVERAGE_PCT: ${{ secrets.AMOUNT_MIN_COVERAGE_PCT }}
          SCHEDULE_AUTO_THROTTLE: ${{ secrets.SCHEDULE_AUTO_THROTTLE }}
          SCHEDULE_MAX_RECORDS: ${{ secrets.SCHEDULE_MAX_RECORDS }}
          SCHEDULE_MAX_RECORDS_FLOOR: ${{ secrets.SCHEDULE_MAX_RECORDS_FLOOR }}
          SCHEDULE_MAX_RECORDS_CEILING: ${{ secrets.SCHEDULE_MAX_RECORDS_CEILING }}
          REQUIRE_OCR_TOOLS: ${{ secrets.REQUIRE_OCR_TOOLS }}
          MARICOPA_ENABLE_ARTIFACT_RETRIEVAL: ${{ vars.MARICOPA_ENABLE_ARTIFACT_RETRIEVAL || '0' }}
          MARICOPA_ARTIFACT_URL_TEMPLATE: ${{ secrets.MARICOPA_ARTIFACT_URL_TEMPLATE }}
          MARICOPA_SESSION_MAX_AGE_MINUTES: ${{ vars.MARICOPA_SESSION_MAX_AGE_MINUTES || '240' }}
          MARICOPA_RETRY_ATTEMPTS: ${{ vars.MARICOPA_RETRY_ATTEMPTS || '3' }}
          MARICOPA_RETRY_BASE_DELAY_MS: ${{ vars.MARICOPA_RETRY_BASE_DELAY_MS || '1000' }}
          MARICOPA_RETRY_MAX_DELAY_MS: ${{ vars.MARICOPA_RETRY_MAX_DELAY_MS || '10000' }}
          MARICOPA_OCR_MAX_PAGES: ${{ vars.MARICOPA_OCR_MAX_PAGES || '2' }}
          MARICOPA_OUT_DIR: ${{ vars.MARICOPA_OUT_DIR || '/tmp/maricopa' }}
          LEAD_ALERT_EMAIL_TO: antigravity1@timberlinetax.com
          LEAD_ALERT_EMAIL_FROM: ${{ secrets.LEAD_ALERT_EMAIL_FROM }}
          LEAD_ALERT_RESEND_API_KEY: ${{ secrets.LEAD_ALERT_RESEND_API_KEY }}
          REVIEW_QUEUE_RETENTION_DAYS: 7
          SCHEDULE_CA_SOS_TIMEZONE: ${{ vars.SCHEDULE_CA_SOS_TIMEZONE || 'America/Denver' }}
          SCHEDULE_CA_SOS_WEEKLY_DAYS: ${{ vars.SCHEDULE_CA_SOS_WEEKLY_DAYS || 'MO,TU,WE,TH,FR' }}
          SCHEDULE_CA_SOS_MORNING_RUN_HOUR: ${{ vars.SCHEDULE_CA_SOS_MORNING_RUN_HOUR || '10' }}
          SCHEDULE_CA_SOS_MORNING_RUN_MINUTE: ${{ vars.SCHEDULE_CA_SOS_MORNING_RUN_MINUTE || '0' }}
          SCHEDULE_CA_SOS_AFTERNOON_RUN_HOUR: ${{ vars.SCHEDULE_CA_SOS_AFTERNOON_RUN_HOUR || '14' }}
          SCHEDULE_CA_SOS_AFTERNOON_RUN_MINUTE: ${{ vars.SCHEDULE_CA_SOS_AFTERNOON_RUN_MINUTE || '0' }}
          SCHEDULE_CA_SOS_EVENING_RUN_HOUR: ${{ vars.SCHEDULE_CA_SOS_EVENING_RUN_HOUR || '22' }}
          SCHEDULE_CA_SOS_EVENING_RUN_MINUTE: ${{ vars.SCHEDULE_CA_SOS_EVENING_RUN_MINUTE || '0' }}
          SCHEDULE_CA_SOS_TRIGGER_LEAD_MINUTES: ${{ vars.SCHEDULE_CA_SOS_TRIGGER_LEAD_MINUTES || '180' }}
          SCHEDULE_CA_SOS_MAX_RECORDS: ${{ vars.SCHEDULE_CA_SOS_MAX_RECORDS || '75' }}
          SCHEDULE_MARICOPA_RECORDER_TIMEZONE: ${{ vars.SCHEDULE_MARICOPA_RECORDER_TIMEZONE || 'America/Denver' }}
          SCHEDULE_MARICOPA_RECORDER_WEEKLY_DAYS: ${{ vars.SCHEDULE_MARICOPA_RECORDER_WEEKLY_DAYS || 'MO,TU,WE,TH,FR' }}
          SCHEDULE_MARICOPA_RECORDER_MORNING_RUN_HOUR: ${{ vars.SCHEDULE_MARICOPA_RECORDER_MORNING_RUN_HOUR || '10' }}
          SCHEDULE_MARICOPA_RECORDER_MORNING_RUN_MINUTE: ${{ vars.SCHEDULE_MARICOPA_RECORDER_MORNING_RUN_MINUTE || '0' }}
          SCHEDULE_MARICOPA_RECORDER_AFTERNOON_RUN_HOUR: ${{ vars.SCHEDULE_MARICOPA_RECORDER_AFTERNOON_RUN_HOUR || '14' }}
          SCHEDULE_MARICOPA_RECORDER_AFTERNOON_RUN_MINUTE: ${{ vars.SCHEDULE_MARICOPA_RECORDER_AFTERNOON_RUN_MINUTE || '0' }}
          SCHEDULE_MARICOPA_RECORDER_EVENING_RUN_HOUR: ${{ vars.SCHEDULE_MARICOPA_RECORDER_EVENING_RUN_HOUR || '22' }}
          SCHEDULE_MARICOPA_RECORDER_EVENING_RUN_MINUTE: ${{ vars.SCHEDULE_MARICOPA_RECORDER_EVENING_RUN_MINUTE || '0' }}
          SCHEDULE_MARICOPA_RECORDER_MAX_RECORDS: ${{ vars.SCHEDULE_MARICOPA_RECORDER_MAX_RECORDS || '250' }}
          SCHEDULE_NYC_ACRIS_TIMEZONE: ${{ vars.SCHEDULE_NYC_ACRIS_TIMEZONE || 'America/Denver' }}
          SCHEDULE_NYC_ACRIS_WEEKLY_DAYS: ${{ vars.SCHEDULE_NYC_ACRIS_WEEKLY_DAYS || 'MO,TU,WE,TH,FR' }}
          SCHEDULE_NYC_ACRIS_MORNING_RUN_HOUR: ${{ vars.SCHEDULE_NYC_ACRIS_MORNING_RUN_HOUR || '10' }}
          SCHEDULE_NYC_ACRIS_MORNING_RUN_MINUTE: ${{ vars.SCHEDULE_NYC_ACRIS_MORNING_RUN_MINUTE || '0' }}
          SCHEDULE_NYC_ACRIS_AFTERNOON_RUN_HOUR: ${{ vars.SCHEDULE_NYC_ACRIS_AFTERNOON_RUN_HOUR || '14' }}
          SCHEDULE_NYC_ACRIS_AFTERNOON_RUN_MINUTE: ${{ vars.SCHEDULE_NYC_ACRIS_AFTERNOON_RUN_MINUTE || '0' }}
          SCHEDULE_NYC_ACRIS_EVENING_RUN_HOUR: ${{ vars.SCHEDULE_NYC_ACRIS_EVENING_RUN_HOUR || '22' }}
          SCHEDULE_NYC_ACRIS_EVENING_RUN_MINUTE: ${{ vars.SCHEDULE_NYC_ACRIS_EVENING_RUN_MINUTE || '0' }}
          SCHEDULE_NYC_ACRIS_MAX_RECORDS: ${{ vars.SCHEDULE_NYC_ACRIS_MAX_RECORDS || '75' }}
        run: bash scripts/cloud/deploy-cloud-run-service.sh

      - name: Verify deployed service endpoints
        env:
          EXPECTED_GIT_SHA: ${{ github.sha }}
          EXPECTED_SCHEDULER_STORE: postgres
        run: bash scripts/cloud/verify-cloud-run-service.sh

      - name: Resolve deployed service URL
        id: service-url
        run: |
          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" --project="${GCP_PROJECT_ID}" --region="${GCP_REGION}" --format='value(status.url)')"
          echo "service_url=${SERVICE_URL}" >> "$GITHUB_OUTPUT"

      - name: Resolve scheduler token
        env:
          SCHEDULE_RUN_TOKEN_SECRET_REF: ${{ secrets.SCHEDULE_RUN_TOKEN_SECRET_REF }}
        run: |
          SCHEDULE_RUN_TOKEN="$(node scripts/cloud/resolve-secret-ref.js)"
          echo "::add-mask::${SCHEDULE_RUN_TOKEN}"
          echo "SCHEDULE_RUN_TOKEN=${SCHEDULE_RUN_TOKEN}" >> "$GITHUB_ENV"

      - name: Reconcile Cloud Scheduler jobs
        env:
          API_BASE_URL: ${{ steps.service-url.outputs.service_url }}
        run: |
          bash scripts/cloud/create-scheduler-jobs.sh

      - name: Verify Cloud Scheduler jobs
        env:
          API_BASE_URL: ${{ steps.service-url.outputs.service_url }}
        run: bash scripts/cloud/verify-cloud-scheduler-jobs.sh
