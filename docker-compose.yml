services:
  lien-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lien-automation
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
      # Operators: export GIT_SHA=$(git rev-parse --short HEAD) before docker compose build
      - GIT_SHA=${GIT_SHA:-unknown}
    volumes:
      - ./data:/app/data
    command: ["node", "dist/src/server.js"]

  mission-control:
    build:
      context: ./mission-control
      dockerfile: Dockerfile
    container_name: mission-control
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./config/.env.mission-control
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/mission-control.db
      WORKSPACE_BASE_PATH: /app/workspace
      PROJECTS_PATH: /app/workspace/projects
      # Set this if OpenClaw runs on the host machine:
      OPENCLAW_GATEWAY_URL: ws://host.docker.internal:18789
      # Node.js memory limits
      NODE_OPTIONS: --max-old-space-size=1024
    volumes:
      - mission-control-data:/app/data
      - mission-control-workspace:/app/workspace
    depends_on:
      - lien-scraper

volumes:
  mission-control-data:
  mission-control-workspace: