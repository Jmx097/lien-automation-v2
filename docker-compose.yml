services:
  lien-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lien-automation
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
      # Operators: export GIT_SHA=$(git rev-parse --short HEAD) before docker compose build
      - GIT_SHA=${GIT_SHA:-unknown}
    volumes:
      - ./data:/app/data
    command: ["node", "dist/src/server.js"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
